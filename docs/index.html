<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Posiciones - Debate BP</title>
    <link rel="icon" href="data:,">
    <link rel="shortcut icon" href="data:,">
    <link rel="apple-touch-icon" href="data:,">
    
    <!-- Google Fonts - Inter for visual consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Prevent FOUC (Flash of Unstyled Content) -->
    <style>
        body { 
            visibility: hidden; 
            opacity: 0; 
            transition: opacity 0.3s ease-in-out;
        }
        body.loaded { 
            visibility: visible; 
            opacity: 1; 
        }
    </style>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="views/break-predict/break-predict.css">
    <link rel="stylesheet" href="views/speaks/speaks-feeds.css">
    <link rel="stylesheet" href="views/call-manager/call-manager.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-bar-left">
            <div class="nav-menu">
                <button class="nav-menu-button" aria-label="Menu">
                    <div class="menu-icon-container">
                        <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M1 6h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M1 11h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                </button>
                <div class="nav-dropdown">
                    <div class="nav-dropdown-item" id="nav-home" data-i18n-key="mainMenu.homeButton">
                        Inicio
                    </div>
                    <div class="nav-dropdown-item" id="nav-call-manager" data-i18n-key="mainMenu.callManagerButton">
                        Gestor de Call
                    </div>
                    <div class="nav-dropdown-item" id="nav-speaks-feeds" data-i18n-key="mainMenu.speaksAndFeedsButton">
                        Speaks & Feeds
                    </div>
                    <div class="nav-dropdown-item" id="nav-timer" data-i18n-key="mainMenu.timerButton">
                        Timer
                    </div>
                    <div class="nav-dropdown-item" id="nav-break-predict" data-i18n-key="mainMenu.breakPredictButton">
                        Break Predict
                    </div>
                </div>
            </div>
            <div class="nav-bar-title" data-i18n-key="mainMenu.welcome">Debtools</div>
        </div>
        <div class="language-selector">
            <button id="lang-es" class="lang-button active" data-lang="es">ES</button>
            <button id="lang-en" class="lang-button" data-lang="en">EN</button>
        </div>
    </nav>
    <div id="main-menu" class="flex-center-container">
        <div class="content-wrapper max-width-600">
            <h1 class="main-title" data-i18n-key="mainMenu.title">Bienvenido</h1>
            
            <!-- Optional preload indicator (hidden by default) -->
            <div id="preload-indicator" class="preload-indicator" style="display: none;">
                <div class="preload-text">📦 Precargando componentes...</div>
                <div class="preload-progress">
                    <div class="preload-bar" id="preload-bar"></div>
                </div>
            </div>
            
            <button id="go-call-manager" class="menu-button menu-button-primary max-width-400" data-i18n-key="mainMenu.callManagerButton">Gestor de Call</button>
            <button id="go-calificaciones" class="menu-button menu-button-secondary max-width-400" data-i18n-key="mainMenu.speaksAndFeedsButton">Speaks & Feeds</button>
            <button id="go-timer" class="menu-button menu-button-tertiary max-width-400" data-i18n-key="mainMenu.timerButton">Timer</button>
            <button id="go-break-predict" class="menu-button menu-button-quaternary max-width-400" data-i18n-key="mainMenu.breakPredictButton">Break Predict</button>
        </div>
    </div>
    <div id="calificaciones-tab" class="flex-center-container hidden">
        <!-- Speaks & Feeds content will be loaded dynamically -->
    </div>
    <div id="timer-tab" class="hidden">
        <!-- Timer content will be loaded dynamically -->
    </div>
    <div id="main-tab" class="hidden">
        <!-- Call Manager content will be loaded dynamically -->
    </div>
    <div id="break-predict-tab" class="hidden">
        <!-- Break Predict content will be loaded dynamically -->
    </div>

    <!-- Context Menu for Bell Dots -->
    <div class="bell-context-menu" id="bell-context-menu">
        <!-- Dynamic content will be added by JavaScript -->
    </div>

    <script type="module" src="js/main.js"></script>
    
    <!-- Prevent FOUC Script -->
    <script>
        // Show content once styles are loaded
        window.addEventListener('load', function() {
            document.body.classList.add('loaded');
        });
        
        // Fallback in case load event doesn't fire
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                document.body.classList.add('loaded');
            }, 100);
        });
    </script>
</body>
</html>
